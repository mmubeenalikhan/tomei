name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test-db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -ptest"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DB_USERNAME: root
      DB_PASSWORD: test
      DB_NAME: test-db
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DIALECT: mysql

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npx sequelize-cli db:migrate --env test
      - run: npm test

  web-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test -- --watchAll=false
